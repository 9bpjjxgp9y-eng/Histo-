<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal de Guerre - Médecine 14-18</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2a1e12;
            font-family: 'Times New Roman', Georgia, serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .toolbar {
            background: #1a1208;
            padding: 12px 24px;
            border-radius: 40px;
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .toolbar button {
            background: #8b6946;
            border: none;
            color: #f5e6c8;
            padding: 8px 20px;
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px;
            transition: 0.2s;
        }

        .toolbar button:hover {
            background: #a07850;
            transform: scale(1.02);
        }

        .toolbar .mode-btn {
            background: #4a6a3a;
        }

        .toolbar .mode-btn.active {
            background: #c8a86e;
            color: #1a1208;
        }

        .journal-container {
            background: #e8d8b8;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid #c8a86e;
        }

        .journal {
            width: 1100px;
            height: 700px;
            position: relative;
            background: #dac08a;
            border-radius: 8px;
            overflow: hidden;
        }

        .pages-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: #f5e6c8;
            padding: 50px 45px;
            border-radius: 4px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            overflow-y: auto;
        }

        .page h1 {
            font-size: 42px;
            color: #4a2a1a;
            border-bottom: 3px double #c8a86e;
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .page .date {
            font-family: 'Courier New', monospace;
            color: #8b6946;
            font-size: 14px;
            margin-bottom: 25px;
            border-left: 4px solid #c8a86e;
            padding-left: 15px;
        }

        .page .content {
            display: flex;
            gap: 35px;
            margin: 25px 0;
        }

        .page .colonne {
            flex: 1;
            font-size: 15px;
            line-height: 1.55;
            color: #2a1e10;
            text-align: justify;
        }

        .page .colonne textarea {
            width: 100%;
            min-height: 280px;
            background: #fffef7;
            border: 1px dashed #c8a86e;
            font-family: 'Times New Roman', serif;
            font-size: 15px;
            padding: 12px;
            resize: vertical;
            color: #2a1e10;
        }

        .page .image-zone {
            margin: 20px 0;
            border: 2px solid #d8c088;
            background: #e8d8b8;
            text-align: center;
            cursor: pointer;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .page .image-zone:hover {
            background: #f0e4c4;
        }

        .page .image-zone img {
            max-width: 100%;
            max-height: 220px;
            object-fit: contain;
        }

        .page-number {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 13px;
            color: #b8946e;
            font-family: 'Courier New', monospace;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 25px;
        }

        .nav-buttons button {
            background: #4a2e1a;
            border: none;
            color: #f5e6c8;
            font-size: 24px;
            padding: 12px 35px;
            cursor: pointer;
            border-radius: 40px;
            font-family: 'Times New Roman', serif;
            transition: 0.2s;
        }

        .nav-buttons button:hover {
            background: #6b462a;
            transform: scale(1.05);
        }

        .presentation-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .presentation-mode .presentation-page {
            width: 90vw;
            height: 90vh;
            background: #f5e6c8;
            padding: 60px;
            border-radius: 12px;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(255,200,100,0.3);
        }

        @keyframes pageTurn {
            0% { opacity: 1; transform: translateX(0); }
            50% { opacity: 0.6; transform: translateX(-30px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .turn-animation {
            animation: pageTurn 0.3s ease;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button id="editModeBtn" class="mode-btn active">✏️ Mode Édition</button>
    <button id="presentationModeBtn" class="mode-btn">🎬 Mode Présentation</button>
    <button id="exportPptBtn">📥 Télécharger (HTML)</button>
    <button id="addPageBtn">📄 Ajouter une page</button>
    <span style="color:#f5e6c8;">Page <span id="currentPage">1</span> / <span id="totalPages">1</span></span>
</div>

<div class="journal-container">
    <div class="journal">
        <div class="pages-container" id="pagesContainer"></div>
    </div>
    <div class="nav-buttons">
        <button id="prevPageBtn">◀ Page précédente</button>
        <button id="nextPageBtn">Page suivante ▶</button>
    </div>
</div>

<script>
    let pages = [];
    let currentIndex = 0;
    let isPresentationMode = false;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\n\r]/g, '<br>');
    }

    function loadPages() {
        const saved = localStorage.getItem('vintageJournalPages');
        if (saved && JSON.parse(saved).length > 0) {
            pages = JSON.parse(saved);
        } else {
            pages = [
                { titre: "LA MÉDECINE AU FRONT", date: "1914 - Hôpitaux de campagne", col1: "Les premiers mois de la guerre voient l'organisation d'ambulances volantes. Le Dr Dominique Larrey inspire ces structures mobiles. Les brancardiers évacuent les blessés sous les tirs d'obus.", col2: "À Verdun, un blessé sur trois meurt avant d'atteindre l'hôpital. Les infections comme le tétanos font des ravages. Le sérum antitétanique, découvert en 1890, n'est pas encore systématique.", image: null },
                { titre: "BLESSURES PAR ÉCLATS", date: "1915 - Traumatismes de guerre", col1: "70% des blessures sont causées par les éclats d'obus. Contrairement aux balles, ces fragments ramènent des débris d'uniforme et de terre dans la plaie, provoquant des infections foudroyantes.", col2: "La gangrène gazeuse tue en 48 heures. Les chirurgiens pratiquent l'excision large et l'amputation précoce. Le Dr Alexis Carrel invente une méthode de stérilisation des plaies.", image: null },
                { titre: "CHIRURGIE D'URGENCE", date: "1916 - Progrès déchirants", col1: "Des équipes chirurgicales s'installent à moins de 10 km du front. Le 'tri' des blessés (ceux qu'on peut sauver, ceux qu'on laisse) est instauré faute de moyens.", col2: "La radiographie mobile permet de localiser les projectiles. Marie Curie conçoit des 'petites Curies' : 20 voitures radiologiques qui sauvent des milliers de vies.", image: null },
                { titre: "MUTILATIONS FACIALES", date: "1917 - Les 'Gueules Cassées'", col1: "Les éclats d'obus défigurent des milliers de soldats. Le pionnier de la chirurgie maxillo-faciale, Hippolyte Morestin, puis Harold Gillies, inventent des greffes novatrices.", col2: "À Val-de-Grâce, on fabrique des prothèses faciales en celluloïd peintes. Les 'gueules cassées' deviennent invisibles grâce aux masques. Un traumatisme psychologique immense.", image: null },
                { titre: "INFIRMIÈRES VOLONTAIRES", date: "1918 - Anges blancs", col1: "Plus de 10 000 infirmières françaises et britanniques servent à proximité des lignes. Elles subissent les bombardements, les infections, l'épuisement.", col2: "Nombreuses décorations : la Croix de guerre pour certaines. Leur journal intime raconte l'horreur quotidienne. Après la guerre, certaines souffrent de 'fatigue de combat'.", image: null },
                { titre: "MÉMOIRE DES GUÉRISSEURS", date: "Armistice - Héritage médical", col1: "Cette guerre a accéléré les avancées : transfusion sanguine, antiseptiques, anesthésie locale, rééducation fonctionnelle. Des milliers de vies sont sauvées grâce à l'expérience du front.", col2: "Mais le prix est lourd : 8 millions de blessés. La médecine de guerre a laissé des leçons qui serviront lors des conflits suivants. Honneur aux médecins, brancardiers, infirmières.", image: null }
            ];
        }
        renderPages();
        updatePageCounter();
    }

    function renderPages() {
        const container = document.getElementById('pagesContainer');
        container.innerHTML = '';
        pages.forEach((page, idx) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            if (idx !== currentIndex) pageDiv.style.display = 'none';
            pageDiv.id = `page-${idx}`;
            
            pageDiv.innerHTML = `
                <h1 contenteditable="true" class="edit-titre">${escapeHtml(page.titre)}</h1>
                <div contenteditable="true" class="date edit-date">${escapeHtml(page.date)}</div>
                <div class="image-zone" data-idx="${idx}">
                    ${page.image ? `<img src="${page.image}" alt="Photo d'époque">` : '<div style="padding:40px; text-align:center; color:#8b6946;">📷 Cliquez pour ajouter une photo</div>'}
                </div>
                <div class="content">
                    <div class="colonne"><textarea class="col1-text" placeholder="Texte colonne 1...">${escapeHtml(page.col1)}</textarea></div>
                    <div class="colonne"><textarea class="col2-text" placeholder="Texte colonne 2...">${escapeHtml(page.col2)}</textarea></div>
                </div>
                <div class="page-number">— ${idx+1} —</div>
            `;
            
            const titreElem = pageDiv.querySelector('.edit-titre');
            titreElem.addEventListener('blur', (e) => { pages[idx].titre = e.target.innerText; saveToLocal(); });
            
            const dateElem = pageDiv.querySelector('.edit-date');
            dateElem.addEventListener('blur', (e) => { pages[idx].date = e.target.innerText; saveToLocal(); });
            
            const col1Area = pageDiv.querySelector('.col1-text');
            col1Area.addEventListener('change', (e) => { pages[idx].col1 = e.target.value; saveToLocal(); });
            
            const col2Area = pageDiv.querySelector('.col2-text');
            col2Area.addEventListener('change', (e) => { pages[idx].col2 = e.target.value; saveToLocal(); });
            
            const imgZone = pageDiv.querySelector('.image-zone');
            imgZone.addEventListener('click', () => uploadImage(idx));
            
            container.appendChild(pageDiv);
        });
        showPage(currentIndex);
    }

    function uploadImage(pageIdx) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file && file.size < 2 * 1024 * 1024) { // limite 2MB
                const reader = new FileReader();
                reader.onload = (ev) => {
                    pages[pageIdx].image = ev.target.result;
                    saveToLocal();
                    renderPages();
                };
                reader.readAsDataURL(file);
            } else {
                alert("Image trop volumineuse (max 2 Mo)");
            }
        };
        input.click();
    }

    function showPage(index) {
        document.querySelectorAll('.page').forEach((page, i) => {
            page.style.display = i === index ? 'block' : 'none';
        });
        currentIndex = index;
        document.getElementById('currentPage').innerText = index + 1;
        document.getElementById('totalPages').innerText = pages.length;
    }

    function nextPage() {
        if (currentIndex < pages.length - 1) {
            const currentPageDiv = document.getElementById(`page-${currentIndex}`);
            currentPageDiv.classList.add('turn-animation');
            setTimeout(() => {
                currentPageDiv.classList.remove('turn-animation');
                showPage(currentIndex + 1);
            }, 200);
        } else {
            showPage(0);
        }
    }

    function prevPage() {
        if (currentIndex > 0) {
            showPage(currentIndex - 1);
        } else {
            showPage(pages.length - 1);
        }
    }

    function saveToLocal() {
        localStorage.setItem('vintageJournalPages', JSON.stringify(pages));
    }

    function updatePageCounter() {
        document.getElementById('totalPages').innerText = pages.length;
    }

    function startPresentation() {
        if (isPresentationMode) return;
        isPresentationMode = true;
        let presIndex = currentIndex;
        
        const overlay = document.createElement('div');
        overlay.className = 'presentation-mode';
        overlay.id = 'presentationOverlay';
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'presentation-page';
        overlay.appendChild(contentDiv);
        
        const exitBtn = document.createElement('button');
        exitBtn.innerText = '❌ Quitter (Échap)';
        exitBtn.style.position = 'fixed';
        exitBtn.style.bottom = '20px';
        exitBtn.style.right = '20px';
        exitBtn.style.padding = '10px 20px';
        exitBtn.style.background = '#8b6946';
        exitBtn.style.color = 'white';
        exitBtn.style.border = 'none';
        exitBtn.style.borderRadius = '30px';
        exitBtn.style.cursor = 'pointer';
        exitBtn.style.zIndex = '1001';
        exitBtn.onclick = endPresentation;
        overlay.appendChild(exitBtn);
        
        document.body.appendChild(overlay);
        
        function updatePresentationSlide() {
            const page = pages[presIndex];
            contentDiv.innerHTML = `
                <h1 style="font-size: 52px; border-bottom: 3px double #c8a86e;">${escapeHtml(page.titre)}</h1>
                <div style="font-size: 18px; color:#8b6946; margin:15px 0;">${escapeHtml(page.date)}</div>
                ${page.image ? `<div style="text-align:center; margin:20px 0;"><img src="${page.image}" style="max-width:70%; max-height:350px; border:2px solid #c8a86e;"></div>` : ''}
                <div style="display:flex; gap:40px; margin-top:30px;">
                    <div style="flex:1; font-size: 24px; line-height:1.4;">${escapeHtml(page.col1)}</div>
                    <div style="flex:1; font-size: 24px; line-height:1.4;">${escapeHtml(page.col2)}</div>
                </div>
                <div style="margin-top:40px; text-align:center; color:#b8946e;">Page ${presIndex+1}/${pages.length}</div>
            `;
        }
        
        function nextPres() { if (presIndex < pages.length-1) { presIndex++; updatePresentationSlide(); } }
        function prevPres() { if (presIndex > 0) { presIndex--; updatePresentationSlide(); } }
        
        updatePresentationSlide();
        
        const keyHandler = (e) => {
            if (e.key === 'ArrowRight') nextPres();
            else if (e.key === 'ArrowLeft') prevPres();
            else if (e.key === 'Escape') endPresentation();
        };
        document.addEventListener('keydown', keyHandler);
        
        function endPresentation() {
            document.removeEventListener('keydown', keyHandler);
            overlay.remove();
            isPresentationMode = false;
        }
        window.endPresentation = endPresentation;
    }

    function exportToHtml() {
        const htmlContent = `<!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><title>Journal Médecine 14-18</title>
        <style>
            body { background:#2a1e12; font-family:'Times New Roman',serif; display:flex; justify-content:center; padding:40px; }
            .journal { max-width:1100px; background:#f5e6c8; padding:40px; }
            .page { margin-bottom:50px; border-bottom:2px dashed #c8a86e; padding-bottom:30px; }
            h1 { color:#4a2a1a; border-bottom:2px solid #c8a86e; }
            .content { display:flex; gap:30px; }
            .colonne { flex:1; }
            img { max-width:100%; border:2px solid #8b6946; }
        </style>
        </head>
        <body>
        <div class="journal">
        ${pages.map((p, idx) => `
            <div class="page">
                <h1>${escapeHtml(p.titre)}</h1>
                <div>${escapeHtml(p.date)}</div>
                ${p.image ? `<img src="${p.image}">` : ''}
                <div class="content">
                    <div class="colonne">${escapeHtml(p.col1)}</div>
                    <div class="colonne">${escapeHtml(p.col2)}</div>
                </div>
                <div style="text-align:center; margin-top:20px;">— ${idx+1} —</div>
            </div>
        `).join('')}
        </div>
        </body>
        </html>`;
        
        const blob = new Blob([htmlContent], {type: 'text/html'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'journal_medecine_14_18.html';
        link.click();
        URL.revokeObjectURL(link.href);
        alert("Journal téléchargé ! Ouvrez-le dans votre navigateur.");
    }

    document.getElementById('prevPageBtn').onclick = prevPage;
    document.getElementById('nextPageBtn').onclick = nextPage;
    document.getElementById('addPageBtn').onclick = () => {
        pages.push({ titre: "Nouvel article", date: "1914-1918", col1: "Votre texte ici...", col2: "Deuxième colonne...", image: null });
        saveToLocal();
        renderPages();
        showPage(pages.length-1);
        updatePageCounter();
    };
    document.getElementById('presentationModeBtn').onclick = startPresentation;
    document.getElementById('exportPptBtn').onclick = exportToHtml;
    document.getElementById('editModeBtn').onclick = () => {
        alert("Mode édition : cliquez sur les textes pour les modifier. Les images s'ajoutent en cliquant.");
    };
    
    loadPages();
</script>
</body>
</html>
